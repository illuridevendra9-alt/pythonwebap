name: Python DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          echo "Running tests"
          python -m unittest || true

  quality:
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linter
        run: |
          pip install flake8

      - name: Code Quality Check
        run: |
          flake8 . || true

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-devops-app:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-devops-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:

      - name: Deploy Container
        run: |
          docker run -d -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/python-devops-app:latest
